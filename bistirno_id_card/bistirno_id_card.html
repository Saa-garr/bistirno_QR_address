<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ID Card - MD. Sagar</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Roboto', sans-serif;
      background: #ccc;
    }

    .a4-sheet {
      width: 100%;
      min-height: 100vh;
      background: #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    .id-card {
      width: 5.5cm;
      height: 8.5cm;
      background: #fff;
      position: relative;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      font-size: 0.75rem;
    }

    .id-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 10% 30%, #ccc, #fff 60%);
      z-index: 1;
    }

    .cross-lines {
      position: absolute;
      top: 18px;
      left: 12px;
      z-index: 2;
    }

    .cross-lines::before,
    .cross-lines::after {
      content: '';
      position: absolute;
      background: #b6b6b7;
    }

    .cross-lines::before {
      width: 2px;
      height: 120px;
      top: -10px;
      left: 0;
    }

    .cross-lines::after {
      width: 60px;
      height: 2px;
      top: 0;
      left: -10px;
    }

    .photo-wrapper {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      width: 100px;
    }

    .photo-wrapper::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: #36405b;
      top: 15px;
      left: 20px;
      z-index: -1;
    }

    .photo-wrapper img {
      width: 100%;
      border: 1px solid #333;
      display: block;
    }

    .info {
      position: absolute;
      top: 160px;
      width: 100%;
      text-align: center;
      padding: 0 5px;
      z-index: 4;
    }

    .info h2 {
      margin: 5px 0 2px;
      font-size: 14px;
      color: #36405b;
    }

    .info p {
      margin: 2px 0;
      font-size: 11px;
      color: #545454;
      font-weight: 500;
      word-break: break-word;
    }

    .info p strong {
      font-weight: 700;
    }

    .verified-icon {
      width: 14px;
      height: 14px;
      vertical-align: middle;
      margin-left: 5px;
    }

    .footer {
      position: absolute;
      bottom: 0;
      height: 40px;
      width: 100%;
      background: #939394;
      color: #fff;
      text-align: center;
      padding: 5px 3px;
      font-size: 8px;
      z-index: 3;
    }

    .footer .brand {
      font-size: 12px;
      font-weight: bold;
    }

    .footer .tagline {
      font-size: 10px;
      color: #ccc;
      margin-top: 2px;
    }

    .footer .tagline .o {
      color: red;
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
      .id-card {
        width: 72vw;
        height: calc(72vw * 8.5 / 5.5);
      }

      .cross-lines::before {
        height: 25vw;
      }

      .cross-lines::after {
        width: 13vw;
      }

      .photo-wrapper {
        width: 43%;
        top: 8%;
      }

      .info {
        top: 50%;
      }

      .info h2 {
        font-size: 3.8vw;
      }

      .info p {
        font-size: 2.8vw;
      }

      .verified-icon {
        width: 3vw;
        height: 3vw;
      }

      .footer {
        height: 13%;
      }

      .footer .brand {
        font-size: 3.5vw;
      }

      .footer .tagline {
        font-size: 2.5vw;
      }
    }
  </style>
</head>
<body>

  <div class="a4-sheet">
    <div class="id-card">

      <!-- Decorative Lines -->
      <div class="cross-lines"></div>

      <!-- Profile Photo -->
      <div class="photo-wrapper">
        <img src="sagar_bistirno.png" alt="MD. Sagar">
      </div>

      <!-- Information Section -->
      <div class="info">
        <h2>MD. SAGAR</h2>
        <p>IT SUPPORT ENGR. &amp; SITE SUPERVISOR</p>
        <br>
        <p>
          <strong>ID NO</strong> - 202403002
          <img class="verified-icon" src="https://cdn-icons-png.flaticon.com/512/5972/5972871.png" alt="Verified">
        </p>
        <p><strong>PHONE</strong> - +8801518-955440</p>
        <p><strong>E-MAIL</strong> - sagar@nextgenarchbd.com</p>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="brand">বিস্তীর্ণ স্থাপত্য</span></div>
        <div class="tagline">Architects, Engineers &amp; Interi<span class="o">o</span>rs</div>
      </div>

    </div>
  </div>

</body>
</html>
